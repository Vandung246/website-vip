<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo">
            <h1>🚀 Hệ Thống Quản Lý</h1>
        </div>
        <nav>
            <a href="trangchu.html" class="nav-link">Trang chủ</a>
            <a href="khachhang.html" class="nav-link">Khách hàng</a>
            <a href="dichvu.html" class="nav-link active">Dịch vụ</a>
            <a href="thongke.html" class="nav-link">Thống kê</a>
            <a href="index.html" class="nav-link" onclick="logout(); return false;">Đăng xuất</a>
        </nav>
    </div>
</header>

<section class="banner">
    <div class="banner-content">
        <h2>Quản lý dịch vụ</h2>
        <p>Quản lý các dịch vụ của hệ thống một cách chi tiết và hiệu quả</p>
        <div class="banner-decoration"></div>
    </div>
</section>

<section class="customer-management">
    <div class="container-fluid">
        <!-- Form thêm/sửa dịch vụ -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0" id="formTitle">➕ Thêm Dịch Vụ Mới</h4>
            </div>
            <div class="card-body">
                <form id="serviceForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tendv" class="form-label">Tên dịch vụ <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="tendv" placeholder="Nhập tên dịch vụ" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="gia" class="form-label">Giá (VNĐ) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="gia" placeholder="Nhập giá dịch vụ" min="0" step="1000" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="mota" class="form-label">Mô tả</label>
                            <textarea class="form-control" id="mota" rows="3" placeholder="Nhập mô tả dịch vụ"></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="trangthai" class="form-label">Trạng thái <span class="text-danger">*</span></label>
                            <select class="form-select" id="trangthai" required>
                                <option value="active">✅ Đang hoạt động</option>
                                <option value="inactive">⏸️ Tạm dừng</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success" id="submitBtn">
                            <span>💾</span> Thêm Dịch Vụ
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="resetForm()" style="display: none;">
                            <span>❌</span> Hủy
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tìm kiếm và lọc -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row align-items-end">
                    <div class="col-md-4 mb-2">
                        <label for="searchInput" class="form-label">Tìm kiếm</label>
                        <input type="text" class="form-control" id="searchInput" placeholder="Tìm theo tên, mô tả...">
                    </div>
                    <div class="col-md-3 mb-2">
                        <label for="sortBy" class="form-label">Sắp xếp theo</label>
                        <select class="form-select" id="sortBy">
                            <option value="ten">Tên (A-Z)</option>
                            <option value="ten-desc">Tên (Z-A)</option>
                            <option value="gia">Giá (Thấp → Cao)</option>
                            <option value="gia-desc">Giá (Cao → Thấp)</option>
                            <option value="ngaytao">Ngày tạo (Mới nhất)</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-2">
                        <label for="filterTrangThai" class="form-label">Lọc theo trạng thái</label>
                        <select class="form-select" id="filterTrangThai">
                            <option value="">Tất cả</option>
                            <option value="active">Đang hoạt động</option>
                            <option value="inactive">Tạm dừng</option>
                        </select>
                    </div>
                    <div class="col-md-2 mb-2">
                        <button class="btn btn-outline-secondary w-100" onclick="resetFilter()">
                            <span>🔄</span> Reset
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bảng danh sách -->
        <div class="card shadow-sm">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="mb-0">📋 Danh Sách Dịch Vụ</h5>
                <span class="badge bg-success" id="serviceCount">Tổng: 0</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="serviceTable">
                        <thead class="table-light">
                            <tr>
                                <th>STT</th>
                                <th>Tên dịch vụ</th>
                                <th>Giá (VNĐ)</th>
                                <th>Mô tả</th>
                                <th>Trạng thái</th>
                                <th>Ngày tạo</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="list">
                            <!-- Dữ liệu sẽ được thêm bằng JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 - Thiết kế bởi bạn</p>
</footer>

<script src="js/auth.js"></script>
<script src="js/dichvu.js"></script>
</body>
</html>
